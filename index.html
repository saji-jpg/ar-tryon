<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#18243a">
  <title>制服AR試着</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">CHROMEBOOK AR</p>
        <h1>制服AR試着</h1>
      </div>
      <button id="fullscreenButton" class="icon-button" type="button" aria-label="全画面表示">全画面</button>
    </header>

    <section class="stage" aria-label="AR試着画面">
      <video id="camera" playsinline muted></video>
      <canvas id="output"></canvas>

      <div id="welcome" class="welcome">
        <span class="camera-mark" aria-hidden="true">●</span>
        <h2>カメラに全身を映してください</h2>
        <p>肩からひざ辺りまで映ると、制服を合わせやすくなります。</p>
        <button id="startButton" class="start-button" type="button">カメラを開始</button>
        <small>映像は端末内で処理され、保存・送信されません。</small>
      </div>

      <div id="status" class="status" role="status" aria-live="polite">準備中</div>
      <div class="guide" aria-hidden="true"><span></span></div>
    </section>

    <nav class="controls" aria-label="制服を選択">
      <button class="uniform-button selected" type="button" data-uniform="natsu" aria-pressed="true">
        <span class="swatch summer"></span><span><strong>夏服</strong><small>半袖</small></span>
      </button>
      <button class="uniform-button" type="button" data-uniform="aihuku" aria-pressed="false">
        <span class="swatch midseason"></span><span><strong>合服</strong><small>ベスト</small></span>
      </button>
      <button class="uniform-button" type="button" data-uniform="huyu" aria-pressed="false">
        <span class="swatch winter"></span><span><strong>冬服</strong><small>ブレザー</small></span>
      </button>
    </nav>
  </main>
  <script src="app-v2.js?v=20260714-2"></script>
</body>
</html>
